<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="7Crew CRM">
<title>7Crew CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--red:#cb2026;--black:#0c0a0a;--gray:#c0c2c4;--light:#f2f2f2;--white:#fff;--muted:#6b7280;--border:#e2e2e2;--blue:#0056B4;--blue-mid:#81C1EA;--blue-light:#6FC3E8}
body{font-family:'Montserrat',sans-serif;background:var(--light);color:var(--black);overscroll-behavior:none}
a{color:inherit;text-decoration:none}
.topbar{background:var(--black);color:#fff;padding:10px 16px;min-height:80px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-circle{width:34px;height:34px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-7{font-size:18px;font-weight:800;color:var(--black);line-height:1}
.logo-text{display:flex;flex-direction:column;line-height:1}
.logo-crew{font-size:15px;font-weight:800;color:var(--red);letter-spacing:.02em}
.logo-ent{font-size:8px;font-weight:600;color:var(--gray);letter-spacing:.12em;text-transform:uppercase;margin-top:1px}
.btn-export{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:11px;padding:6px 12px;border-radius:4px;cursor:pointer;font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-family:inherit}
.tabs{display:flex;background:var(--white);border-bottom:2px solid var(--border)}
.tab{flex:1;padding:13px 8px;text-align:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;text-transform:uppercase;letter-spacing:.06em;margin-bottom:-2px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.search-wrap{padding:12px 16px;background:var(--white);border-bottom:1px solid var(--border);display:flex;gap:8px}
.search-wrap input{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;background:#f8f8f8;color:var(--black);outline:none;font-family:inherit;-webkit-appearance:none}
.search-wrap input:focus{border-color:var(--red)}
.btn-add{padding:10px 18px;background:var(--red);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:.04em}
.content{padding:12px 16px 40px}
.section{display:none}.section.active{display:block}
.contact-card{background:var(--white);border:1px solid var(--border);border-left:4px solid var(--blue);border-radius:8px;padding:14px;margin-bottom:10px;cursor:pointer}
.card-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;background:var(--black);color:#fff;overflow:hidden;border:2px solid var(--blue)}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.card-name{font-size:15px;font-weight:700;color:var(--black)}
.card-role{font-size:11px;color:var(--muted);margin-top:2px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.tag{font-size:11px;padding:3px 9px;border-radius:4px;border:1px solid var(--border);color:var(--muted);background:#f8f8f8;font-weight:500}
.tag.co{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600;cursor:pointer}
.tag.co.linked{border-bottom:2px solid var(--red)}
.card-meta{font-size:12px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}
.org-card{background:var(--white);border:1px solid var(--border);border-left:4px solid var(--blue-mid);border-radius:8px;margin-bottom:10px;overflow:hidden}
.org-card-body{padding:14px}
.org-name{font-size:15px;font-weight:700;color:var(--black)}
.org-sub{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.type-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:4px 10px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em}
.store-badge{background:var(--black);color:#fff;font-size:10px;font-weight:700;padding:4px 10px;border-radius:4px}
.map-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--black);font-weight:700;padding:6px 12px;border-radius:4px;background:var(--light);border:1px solid var(--border);cursor:pointer;margin-top:6px;margin-right:6px;text-transform:uppercase;letter-spacing:.04em;font-family:inherit}
.edit-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:700;padding:6px 12px;border-radius:4px;background:var(--light);border:1px solid var(--border);cursor:pointer;margin-top:6px;text-transform:uppercase;letter-spacing:.04em;font-family:inherit}
.territory-box{background:#f8f8f8;border-top:1px solid var(--border);padding:10px 14px;font-size:12px;color:var(--muted);line-height:1.6}
.territory-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--red);margin-bottom:4px}
.people-list{border-top:1px solid var(--border);padding:10px 14px}
.person-row{display:flex;align-items:center;gap:10px;padding:5px 0}
.mini-av{width:32px;height:32px;border-radius:50%;background:var(--black);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.person-name{font-size:13px;font-weight:600;color:var(--black)}
.person-role{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.view-btn{font-size:10px;color:var(--blue);font-weight:700;padding:4px 10px;border-radius:4px;background:#fff;border:1px solid var(--blue);cursor:pointer;margin-left:auto;flex-shrink:0;text-transform:uppercase;letter-spacing:.04em;font-family:inherit}
.overlay{position:fixed;inset:0;background:rgba(12,10,10,0.6);z-index:100;display:none}
.overlay.open{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;padding:16px 18px 40px;max-height:92vh;overflow-y:auto;z-index:101;transform:translateY(100%);transition:transform 0.3s ease}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--gray);border-radius:2px;margin:0 auto 16px}
.sheet-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;border-bottom:2px solid var(--blue);padding-bottom:12px}
.sheet-title{font-size:16px;font-weight:800;color:var(--black);text-transform:uppercase;letter-spacing:.04em}
.close-btn{width:30px;height:30px;border-radius:50%;background:var(--light);border:none;cursor:pointer;font-size:16px;color:var(--muted);font-family:inherit}
.form-row{margin-bottom:13px}
.form-row label{display:block;font-size:10px;color:var(--red);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;background:#fff;color:var(--black);outline:none;font-family:inherit;-webkit-appearance:none}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--red)}
.form-row textarea{resize:vertical;min-height:80px;line-height:1.5}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.divider{font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 10px;padding-top:14px;border-top:2px solid var(--red)}
.btn-save{width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px;font-family:inherit;text-transform:uppercase;letter-spacing:.06em}
.btn-sec{width:100%;padding:12px;background:var(--light);color:var(--black);border:1px solid var(--border);border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit;text-transform:uppercase;letter-spacing:.04em}
.btn-del{width:100%;padding:12px;background:#fff;color:var(--red);border:1px solid var(--red);border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;margin-top:6px;font-family:inherit;text-transform:uppercase;letter-spacing:.04em}
.add-more{width:100%;padding:10px;background:#fff;color:var(--black);border:1px dashed var(--gray);border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:10px;font-family:inherit;text-transform:uppercase;letter-spacing:.04em}
.sub-block{background:#f8f8f8;border-radius:6px;padding:12px;margin-bottom:8px;border:1px solid var(--border);border-left:3px solid var(--blue-mid);position:relative}
.sub-remove{position:absolute;top:8px;right:8px;background:var(--border);border:none;border-radius:50%;width:22px;height:22px;font-size:11px;cursor:pointer;color:var(--muted);font-family:inherit}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f1f1f1;font-size:14px}
.info-lbl{color:var(--muted);flex-shrink:0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.info-val{color:var(--black);font-weight:600;text-align:right;margin-left:12px}
.info-val a{color:var(--red)}
.notes-box{background:#f8f8f8;border-radius:6px;padding:12px;font-size:13px;color:var(--muted);line-height:1.6;border-left:3px solid var(--blue-light);margin-top:4px}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-size:11px;color:var(--blue);cursor:pointer;margin-bottom:16px;font-weight:700;padding:0;text-transform:uppercase;letter-spacing:.05em;font-family:inherit}
.detail-av{width:64px;height:64px;border-radius:50%;background:var(--black);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;flex-shrink:0;overflow:hidden;border:3px solid var(--blue)}
.detail-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.empty{text-align:center;padding:60px 20px}
.empty p{font-size:13px;color:var(--muted);font-weight:500}
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--black);color:#fff;padding:10px 22px;border-radius:4px;font-size:11px;font-weight:700;z-index:200;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;text-transform:uppercase;letter-spacing:.06em}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.nearby-banner{display:none;background:var(--red);color:#fff;padding:10px 16px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;width:100%;text-align:left}
.nearby-banner.show{display:block}
.nearby-banner-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;opacity:.85;margin-bottom:3px}
.nearby-banner-body{font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center}

/* ── AI / Dashboard styles ── */
.ai-section{padding:14px 16px 60px;font-family:'Montserrat',sans-serif}
.ai-section h2{font-size:13px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.08em;margin:0 0 14px}
.kpi-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.kpi-box{background:#fff;border:1px solid var(--border);border-left:4px solid var(--blue);border-radius:6px;padding:12px}
.kpi-num{font-size:20px;font-weight:800;color:var(--black);line-height:1}
.kpi-lbl{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.kpi-sub{font-size:10px;color:var(--red);font-weight:700;margin-top:2px}
.ai-card{background:#fff;border:1px solid var(--border);border-radius:8px;margin-bottom:12px;overflow:hidden}
.ai-card-head{background:var(--black);color:#fff;padding:10px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;display:flex;justify-content:space-between;align-items:center}
.ai-card-head .badge-r{background:var(--red);font-size:10px;padding:2px 8px;border-radius:3px;font-weight:700}
.ai-card-body{padding:12px 14px}
.region-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.region-name{font-size:11px;font-weight:700;color:var(--black);width:38px;text-transform:uppercase}
.region-track{flex:1;background:#f2f2f2;border-radius:3px;height:7px;overflow:hidden}
.region-fill{height:7px;background:var(--red);border-radius:3px}
.region-val{font-size:11px;color:#6b7280;width:44px;text-align:right}
.region-sss{font-size:11px;font-weight:700;width:40px;text-align:right}
.insight-strip{background:#fff8f8;border-left:3px solid var(--red);border-radius:0;padding:8px 12px;margin-bottom:8px;font-size:12px;color:var(--black);line-height:1.5}
.dev-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.dev-box{background:#fff;border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center}
.dev-num{font-size:22px;font-weight:800;color:var(--black)}
.dev-lbl{font-size:9px;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.open-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f1f1f1;font-size:13px}
.open-row:last-child{border-bottom:none}
.open-state{font-size:10px;background:var(--black);color:#fff;padding:2px 7px;border-radius:3px;font-weight:700}
.ai-form-row{margin-bottom:12px}
.ai-form-row label{display:block;font-size:10px;color:var(--red);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.ai-form-row input,.ai-form-row textarea,.ai-form-row select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:'Montserrat',sans-serif;color:var(--black);background:#fff;box-sizing:border-box;outline:none}
.ai-form-row input:focus,.ai-form-row textarea:focus{border-color:var(--red)}
.ai-form-row textarea{resize:vertical;min-height:72px;line-height:1.5}
.tag-row{display:flex;flex-wrap:wrap;gap:6px}
.ai-tag{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid var(--border);background:#f8f8f8;color:#6b7280;cursor:pointer;font-family:'Montserrat',sans-serif;text-transform:uppercase;letter-spacing:.04em}
.ai-tag.active{background:var(--black);color:#fff;border-color:var(--black)}
.btn-gen{width:100%;padding:13px;background:var(--red);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;text-transform:uppercase;letter-spacing:.07em;margin-top:4px}
.btn-gen:hover{background:#a81a1f}
.btn-gen:disabled{background:#c0c2c4;cursor:not-allowed}
.brief-out{margin-top:14px;background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.brief-head{background:var(--black);padding:12px 14px}
.brief-head h3{color:#fff;font-size:14px;font-weight:800;margin:0 0 2px;text-transform:uppercase;letter-spacing:.04em}
.brief-head p{color:var(--gray);font-size:11px;margin:0}
.brief-body{padding:12px 14px}
.brief-sec-label{font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.08em;margin:12px 0 6px;display:flex;align-items:center;gap:6px}
.brief-sec-label::after{content:'';flex:1;height:1px;background:var(--blue-light)}
.brief-text{font-size:13px;color:var(--black);line-height:1.6}
.brief-bullets{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:5px}
.brief-bullets li{font-size:13px;color:var(--black);line-height:1.5;display:flex;gap:8px}
.brief-bullets li::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--red);margin-top:7px;flex-shrink:0}
.num-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:4px}
.num-card{background:#f8f8f8;border-radius:5px;padding:9px 10px;border-left:3px solid var(--blue)}
.num-card-lbl{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.num-card-val{font-size:13px;font-weight:800;color:var(--black)}
.alert-strip{background:#fff8f8;border-left:3px solid var(--red);padding:9px 12px;margin-top:4px;font-size:12px;color:var(--black);line-height:1.5}
.copy-strip{width:100%;padding:9px;background:#f8f8f8;border:1px solid var(--border);border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;text-transform:uppercase;letter-spacing:.05em;margin-top:10px;color:var(--black)}
.research-note{background:#e8f4fd;border-radius:5px;padding:8px 12px;font-size:11px;color:var(--blue);display:flex;align-items:center;gap:6px;margin-bottom:12px}
.action-item-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #f1f1f1}
.action-item-row:last-child{border-bottom:none;padding-bottom:0}
.action-chk{width:18px;height:18px;border-radius:4px;border:2px solid var(--red);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.action-chk.done{background:var(--red)}
.action-chk.done::after{content:'✓';color:#fff;font-size:10px;font-weight:800}
.action-txt{font-size:13px;color:var(--black);line-height:1.5;flex:1}
.action-own{font-size:10px;color:#6b7280;margin-top:2px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.priority-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.p-high{background:#E24B4A}.p-med{background:var(--blue-mid)}.p-low{background:#1D9E75}
.decision-row{padding:7px 0;border-bottom:1px solid #f1f1f1;font-size:13px;color:var(--black);line-height:1.5;display:flex;gap:8px}
.decision-row:last-child{border-bottom:none;padding-bottom:0}
.decision-row::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--blue);margin-top:7px;flex-shrink:0}
.people-row-debrief{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f1f1f1}
.people-row-debrief:last-child{border-bottom:none;padding-bottom:0}
.mini-av-r{width:32px;height:32px;border-radius:50%;background:var(--black);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.email-subj{font-size:11px;color:#6b7280;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.email-body-pre{font-size:13px;color:var(--black);line-height:1.7;white-space:pre-wrap;font-family:'Montserrat',sans-serif}
.loading-dots{display:flex;align-items:center;gap:6px;padding:1rem 0;color:#6b7280;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.dot-r{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulser 1s infinite}
.dot-r:nth-child(2){animation-delay:.2s}.dot-r:nth-child(3){animation-delay:.4s}
@keyframes pulser{0%,100%{opacity:.25}50%{opacity:1}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.ai-btn-sec{width:100%;padding:11px;background:#fff;border:1px solid var(--border);border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;text-transform:uppercase;letter-spacing:.05em;margin-top:8px;color:var(--black)}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════ TOPBAR -->
<div class="topbar">
  <div class="logo-wrap">
    <div class="logo-circle"><span class="logo-7">7</span></div>
    <div class="logo-text">
      <span class="logo-crew">7CREW</span>
      <span class="logo-ent">Enterprises</span>
    </div>
  </div>
  <button class="btn-export" onclick="exportCSV()">Export CSV</button>
</div>

<!-- ═══════════════════════════════════════════════════ SYNC STATUS -->
<div style="background:#1a1a1a;padding:10px 16px;border-bottom:2px solid var(--red)">
  <p style="font-family:'Montserrat',sans-serif;font-size:13px;font-weight:600;color:#fff;letter-spacing:.12em;text-transform:uppercase;margin:0">
    <span style="color:#fff;font-weight:400;letter-spacing:.16em">Contact Dashboard</span>
  </p>
  <span id="sync-status" style="font-family:'Montserrat',sans-serif;font-size:10px;color:var(--gray);font-weight:500;letter-spacing:.04em;margin-top:2px;display:none"></span>
</div>

<!-- ═══════════════════════════════════════════════════ NEARBY BANNER -->
<button class="nearby-banner" id="nearby-banner" onclick="handleNearbyTap()">

/* ─── SUPABASE ─── */
function supa(path, method, body) {
  var opts = {
    method: method || 'GET',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  return fetch(SUPA_URL + '/rest/v1/' + path, opts)
    .then(function(r){ return r.text().then(function(t){ return t ? JSON.parse(t) : []; }); });
}

/* ─── SYNC STATUS ─── */
function showSync(msg){ var e=document.getElementById('sync-status'); if(e){e.textContent=msg;e.style.display='block';} }
function hideSync(){ var e=document.getElementById('sync-status'); if(e) e.style.display='none'; }

/* ─── LOCAL STORAGE ─── */
function saveLocal(){
  try{ localStorage.setItem(SK, JSON.stringify({contacts:contacts, orgs:orgs, nid:nid})); }catch(e){}
}
function loadLocal(){
  try{
    var r = localStorage.getItem(SK);
    if(r){ var d=JSON.parse(r); contacts=d.contacts||[]; orgs=d.orgs||[]; nid=d.nid||10; }
  }catch(e){}
}

/* ─── FETCH FROM SUPABASE ─── */
function fetchFromSupa(){
  showSync('Loading...');
  supa('contacts?select=*&order=name')
    .then(function(rows){
      if(Array.isArray(rows) && rows.length){
        contacts = rows.map(function(r){
          return {
            id:r.id, name:r.name||'', role:r.role||'', phone:r.phone||'',
            email:r.email||'', linkedin:r.linkedin||'', website:r.website||'',
            photo:r.photo||'', metAt:r.met_at||'', lastContact:r.last_contact||'',
            notes:r.notes||'',
            companies: Array.isArray(r.companies)?r.companies:(r.companies?JSON.parse(r.companies):[]),
            assistants:Array.isArray(r.assistants)?r.assistants:(r.assistants?JSON.parse(r.assistants):[])
          };
        });
      }
      return supa('orgs?select=*&order=name');
    })
    .then(function(rows){
      if(Array.isArray(rows) && rows.length){
        orgs = rows.map(function(r){
          return {
            id:r.id, name:r.name||'', type:r.type||'', territory:r.territory||'',
            stores:parseInt(r.stores)||0, territoryDesc:r.territory_desc||'',
            contacts:Array.isArray(r.contacts)?r.contacts:(r.contacts?JSON.parse(r.contacts):[])
          };
        });
      }
      var maxId=10;
      contacts.forEach(function(c){ if(parseInt(c.id)>=maxId) maxId=parseInt(c.id)+1; });
      orgs.forEach(function(o){ if(parseInt(o.id)>=maxId) maxId=parseInt(o.id)+1; });
      nid = maxId;
      saveLocal();
      renderAll();
      hideSync();
    })
    .catch(function(e){ console.error('Supa fetch:',e); hideSync(); });
}

function upsertContact(c){
  var row={id:c.id,name:c.name,role:c.role,phone:c.phone,email:c.email,linkedin:c.linkedin,
    website:c.website,photo:c.photo,met_at:c.metAt,last_contact:c.lastContact,
    notes:c.notes,companies:c.companies,assistants:c.assistants};
  return supa('contacts?id=eq.'+c.id,'DELETE').catch(function(){}).then(function(){ return supa('contacts','POST',row); });
}
function upsertOrg(o){
  var row={id:o.id,name:o.name,type:o.type,territory:o.territory,
    stores:o.stores,territory_desc:o.territoryDesc,contacts:o.contacts};
  return supa('orgs?id=eq.'+o.id,'DELETE').catch(function(){}).then(function(){ return supa('orgs','POST',row); });
}
function saveContactSync(c){ saveLocal(); showSync('Saving...'); upsertContact(c).then(function(){ hideSync(); toast('Saved!'); }).catch(function(){ hideSync(); toast('Saved locally'); }); }
function saveOrgSync(o){ saveLocal(); showSync('Saving...'); upsertOrg(o).then(function(){ hideSync(); toast('Saved!'); }).catch(function(){ hideSync(); toast('Saved locally'); }); }

function saveReportToSupa(id, html, filename){
  var row={id:id,html:html,filename:filename||'',updated_at:new Date().toISOString()};
  supa('reports?id=eq.'+id,'DELETE').catch(function(){}).then(function(){ return supa('reports','POST',row); }).then(function(){ toast('Report saved ✓'); }).catch(function(e){ console.error('Report save error:',e); });
}
function loadReportsFromSupa(){
  supa('reports?select=*').then(function(rows){
    if(!Array.isArray(rows)) return;
    rows.forEach(function(r){
      if(r.id==='wbr' && r.html){ wbrData=r.html; wbrLoaded=true; }
      if(r.id==='dev' && r.html){ devData=r.html; devLoaded=true; }
    });
  }).catch(function(e){ console.log('Reports load:',e); });
}
function loadLiveMetrics(){
  supa('metrics?id=eq.wbr_current&select=*').then(function(rows){
    if(rows && rows.length) liveMetrics=rows[0];
  }).catch(function(e){ console.log('Metrics load:',e); });
}
function saveMetricsToSupa(metricsObj){
  var row = Object.assign({id:'wbr_current',updated_at:new Date().toISOString()}, metricsObj);
  supa('metrics?id=eq.wbr_current','DELETE').catch(function(){})
    .then(function(){ return supa('metrics','POST',row); })
    .then(function(){ liveMetrics=row; toast('Metrics updated — Digest will use live data'); })
    .catch(function(e){ console.error('Save metrics:',e); });
}

/* ─── UTILS ─── */
function ini(n){ return ((n||'').split(' ').filter(function(w){return w.length>0;}).map(function(w){return w[0];}).join('').slice(0,2).toUpperCase()); }
function gc(id){ for(var i=0;i<contacts.length;i++){ if(contacts[i].id===id||contacts[i].id===parseInt(id)) return contacts[i]; } return null; }
function go(id){ for(var i=0;i<orgs.length;i++){ if(orgs[i].id===id||orgs[i].id===parseInt(id)) return orgs[i]; } return null; }
function findOrg(name){ for(var i=0;i<orgs.length;i++){ if((orgs[i].name||'').toLowerCase()===(name||'').toLowerCase()) return orgs[i].id; } return null; }
function esc(s){ return (s||'').toString().replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'; setTimeout(function(){ t.className='toast'; },2200); }

/* ─── RENDER CONTACTS / ORGS ─── */
function renderAll(){
  renderContacts();
  renderOrgs();
  document.getElementById('contacts-count').textContent = contacts.length;
  document.getElementById('organizations-count').textContent = orgs.length;
}

function renderContacts(){
  var q = (document.getElementById('search-input').value||'').toLowerCase();
  var el = document.getElementById('contacts-list');
  var fl = contacts.filter(function(c){
    if(!q) return true;
    if((c.name||'').toLowerCase().indexOf(q)>=0) return true;
    if((c.role||'').toLowerCase().indexOf(q)>=0) return true;
    for(var i=0;i<(c.companies||[]).length;i++){ if((c.companies[i].name||'').toLowerCase().indexOf(q)>=0) return true; }
    return false;
  });
  fl.sort(function(a,b){ return (a.name||'').toLowerCase().localeCompare((b.name||'').toLowerCase()); });
  if(!fl.length){ el.innerHTML='<div class="empty"><p>'+(q?'No contacts match your search.':'No contacts yet. Tap + Add to get started.')+'</p></div>'; return; }
  var h='';
  for(var i=0;i<fl.length;i++){
    var c=fl[i];
    var av = c.photo ? '<img src="'+c.photo+'" alt="">' : ini(c.name);
    var tg='';
    for(var j=0;j<(c.companies||[]).length;j++){
      var coName=c.companies[j].name; var oid=findOrg(coName);
      tg += oid ? '<span class="tag co linked">'+coName+' &rsaquo;</span>' : '<span class="tag co">'+coName+'</span>';
    }
    if(c.metAt) tg+='<span class="tag">'+c.metAt+'</span>';
    var mt='';
    if(c.phone) mt+='<span>'+c.phone+'</span>';
    if(c.lastContact) mt+='<span>Last contact: '+c.lastContact+'</span>';
    if(c.assistants&&c.assistants.length) mt+='<span>+'+c.assistants.length+' asst.</span>';
    h+='<div class="contact-card" onclick="viewContact('+c.id+')"><div class="card-top"><div class="avatar">'+av+'</div><div style="flex:1;min-width:0"><div class="card-name">'+c.name+'</div><div class="card-role">'+c.role+'</div></div></div><div class="tags">'+tg+'</div><div class="card-meta">'+mt+'</div></div>';
  }
  el.innerHTML=h;
}

function renderOrgs(){
  var q=(document.getElementById('search-input').value||'').toLowerCase();
  var el=document.getElementById('organizations-list');
  var fl=orgs.filter(function(o){
    if(!q) return true;
    if((o.name||'').toLowerCase().indexOf(q)>=0) return true;
    if((o.territory||'').toLowerCase().indexOf(q)>=0) return true;
    if((o.type||'').toLowerCase().indexOf(q)>=0) return true;
    return false;
  });
  fl.sort(function(a,b){ return (a.name||'').toLowerCase().localeCompare((b.name||'').toLowerCase()); });
  if(!fl.length){ el.innerHTML='<div class="empty"><p>'+(q?'No organizations match.':'No organizations yet. Tap + Add to get started.')+'</p></div>'; return; }
  var h='';
  for(var i=0;i<fl.length;i++){
    var o=fl[i]; var people='';
    for(var j=0;j<(o.contacts||[]).length;j++){
      var p=gc(o.contacts[j]); if(!p) continue;
      people+='<div class="person-row"><div class="mini-av">'+ini(p.name)+'</div><div style="flex:1;min-width:0"><div class="person-name">'+p.name+'</div><div class="person-role">'+p.role+'</div></div><button class="view-btn" onclick="event.stopPropagation();viewContact('+p.id+')">View</button></div>';
    }
    h+='<div class="org-card"><div class="org-card-body"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px"><div><div class="org-name">'+o.name+'</div>'+(o.territory?'<div class="org-sub">'+o.territory+'</div>':'')+'</div><div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end">'+(o.type?'<span class="type-badge">'+o.type+'</span>':'')+(o.stores?'<span class="store-badge">'+o.stores+' store'+(o.stores!==1?'s':'')+'</span>':'')+'</div></div><button class="map-btn" onclick="openMap(decodeURIComponent(this.dataset.q))" data-q="'+encodeURIComponent(o.territory||o.name)+'">📍 Map</button><button class="edit-btn" onclick="editOrg('+o.id+')">✎ Edit</button></div>'+(o.territoryDesc?'<div class="territory-box"><div class="territory-label">Territory / Notes</div>'+o.territoryDesc+'</div>':'')+(people?'<div class="people-list">'+people+'</div>':'')+'</div>';
  }
  el.innerHTML=h;
}

/* ─── CONTACT/ORG SHEET ACTIONS ─── */
function openMap(q){ window.open('https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q),'_blank'); }

function viewContact(id){
  var c=gc(id); if(!c) return;
  var av=c.photo?'<img src="'+c.photo+'">':ini(c.name);
  var tg='';
  for(var j=0;j<(c.companies||[]).length;j++){
    var coName=c.companies[j].name; var oid=findOrg(coName);
    tg += oid ? '<span class="tag co linked" onclick="viewOrg('+oid+')" style="cursor:pointer">'+coName+' &rsaquo;</span>' : '<span class="tag co">'+coName+'</span>';
  }
  var inf='';
  if(c.phone) inf+='<div class="info-row"><span class="info-lbl">Phone</span><span class="info-val"><a href="tel:'+c.phone+'">'+c.phone+'</a></span></div>';
  if(c.email) inf+='<div class="info-row"><span class="info-lbl">Email</span><span class="info-val" style="font-size:12px"><a href="mailto:'+c.email+'">'+c.email+'</a></span></div>';
  if(c.linkedin) inf+='<div class="info-row"><span class="info-lbl">LinkedIn</span><span class="info-val"><a href="'+c.linkedin+'" target="_blank" style="color:var(--red)">View Profile</a></span></div>';
  if(c.website) inf+='<div class="info-row"><span class="info-lbl">Website</span><span class="info-val" style="font-size:12px"><a href="'+c.website+'" target="_blank" style="color:var(--red)">'+c.website+'</a></span></div>';
  if(c.metAt) inf+='<div class="info-row"><span class="info-lbl">Where met</span><span class="info-val">'+c.metAt+'</span></div>';
  if(c.lastContact) inf+='<div class="info-row"><span class="info-lbl">Last contacted</span><span class="info-val">'+c.lastContact+'</span></div>';
  var nt=c.notes?'<div style="font-size:10px;color:var(--red);margin-top:14px;margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.07em">Notes</div><div class="notes-box">'+c.notes+'</div>':'';
  var ah='';
  if(c.assistants&&c.assistants.length){
    ah='<div class="divider">Assistants / Additional Contacts</div>';
    for(var k=0;k<c.assistants.length;k++){
      var a=c.assistants[k];
      ah+='<div class="sub-block"><div style="font-size:14px;font-weight:700;margin-bottom:4px">'+a.name+'</div>';
      if(a.role) ah+='<div style="font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">'+a.role+'</div>';
      if(a.phone) ah+='<div style="font-size:13px;color:var(--muted)"><a href="tel:'+a.phone+'" style="color:var(--red)">'+a.phone+'</a></div>';
      if(a.email) ah+='<div style="font-size:12px;color:var(--muted)"><a href="mailto:'+a.email+'" style="color:var(--red)">'+a.email+'</a></div>';
      ah+='</div>';
    }
  }
  document.getElementById('sheet-title').textContent = c.name;
  document.getElementById('sheet-body').innerHTML = '<button class="back-btn" onclick="closeSheet()">&#8592; Back</button><div style="display:flex;align-items:center;gap:14px;margin-bottom:18px"><div class="detail-av">'+av+'</div><div><div style="font-size:19px;font-weight:800">'+c.name+'</div><div style="font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.05em">'+c.role+'</div><div class="tags" style="margin-top:8px">'+tg+'</div></div></div>'+inf+nt+ah+'<button class="btn-sec" onclick="openEdit('+c.id+')">Edit contact</button><button class="btn-del" onclick="delContact('+c.id+')">Delete contact</button>';
  openSheet();
}

function viewOrg(id){
  var o=go(id); if(!o) return;
  var people='';
  for(var j=0;j<(o.contacts||[]).length;j++){
    var p=gc(o.contacts[j]); if(!p) continue;
    people+='<div class="person-row"><div class="mini-av">'+ini(p.name)+'</div><div style="flex:1;min-width:0"><div class="person-name">'+p.name+'</div><div class="person-role">'+p.role+'</div></div><button class="view-btn" onclick="viewContact('+p.id+')">View</button></div>';

var CITY_COORDS={'lubbock':{lat:33.5779,lng:-101.8552},'midland':{lat:31.9973,lng:-102.0779},'odessa':{lat:31.8457,lng:-102.3676},'amarillo':{lat:35.2220,lng:-101.8313},'abilene':{lat:32.4487,lng:-99.7331},'austin':{lat:30.2672,lng:-97.7431},'dallas':{lat:32.7767,lng:-96.7970},'fort worth':{lat:32.7555,lng:-97.3308},'houston':{lat:29.7604,lng:-95.3698},'san antonio':{lat:29.4241,lng:-98.4936},'el paso':{lat:31.7619,lng:-106.4850},'wichita falls':{lat:33.9137,lng:-98.4934},'san angelo':{lat:31.4638,lng:-100.4370},'waco':{lat:31.5493,lng:-97.1467},'tyler':{lat:32.3513,lng:-95.3011}};
function degToRad(d){ return d*(Math.PI/180); }
function distanceMiles(lat1,lng1,lat2,lng2){ var R=3958.8,dLat=degToRad(lat2-lat1),dLng=degToRad(lng2-lng1),a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(degToRad(lat1))*Math.cos(degToRad(lat2))*Math.sin(dLng/2)*Math.sin(dLng/2); return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); }
function getCoordsForTerritory(territory){ if(!territory) return null; var t=territory.toLowerCase(); for(var city in CITY_COORDS){ if(t.indexOf(city)>=0) return CITY_COORDS[city]; } return null; }
function checkNearby(){
  if(!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(function(pos){
    var userLat=pos.coords.latitude,userLng=pos.coords.longitude,RADIUS=40,matches=[];
    for(var i=0;i<orgs.length;i++){ var o=orgs[i]; if(!o.territory) continue; var coords=getCoordsForTerritory(o.territory); if(!coords) continue; var dist=distanceMiles(userLat,userLng,coords.lat,coords.lng); if(dist<=RADIUS) matches.push({org:o,dist:Math.round(dist)}); }
    if(matches.length>0){
      matches.sort(function(a,b){ return a.dist-b.dist; });
      var closest=matches[0]; nearbyOrgId=closest.org.id;
      var people=(closest.org.contacts||[]).map(function(cid){ var c=gc(cid); return c?c.name:null; }).filter(Boolean);
      var peopleStr=people.length?people.slice(0,2).join(', ')+(people.length>2?' +more':''):'';
      document.getElementById('nearby-text').textContent=closest.org.name+(peopleStr?' — '+peopleStr:'')+(closest.dist>0?' ('+closest.dist+' mi)':'');
      document.getElementById('nearby-banner').className='nearby-banner show';
    }
  },function(){},{timeout:8000,maximumAge:300000});
}

/* Robust JSON extractor */
function safeJSON(raw){
  if(!raw) throw new Error('Empty response from AI.');
  var clean=raw.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
  var start=-1,end=-1;
  for(var i=0;i<clean.length;i++){ if(clean[i]==='{'){start=i;break;} }
  for(var i=clean.length-1;i>=0;i--){ if(clean[i]==='}'){ end=i; break; } }
  if(start===-1||end===-1||end<=start) throw new Error('No JSON found');
  try{ return JSON.parse(clean.slice(start,end+1)); }
  catch(e){ throw new Error('JSON parse failed: '+e.message); }
}

    r.readAsDataURL(file);
  });
}

}
function copyBriefMP(){ navigator.clipboard.writeText(document.getElementById('mp-out').innerText).then(function(){ toast('Copied!'); }); }
function saveBriefToContact(){
  var bd=window._lastBriefData; if(!bd||!bd.name){ toast('No brief to save yet.'); return; }
  var notesText='[Meeting Prep — '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+']';
  if(bd.bio) notesText+='\n\n'+bd.bio;
  if(bd.talking_points) notesText+='\n\nTalking points:\n'+bd.talking_points;
  if(bd.things_to_watch) notesText+='\n\nWatch out for: '+bd.things_to_watch;
  var existing=null;
  for(var i=0;i<contacts.length;i++){ if((contacts[i].name||'').toLowerCase()===(bd.name||'').toLowerCase()){ existing=contacts[i]; break; } }
  if(existing){
    if(confirm(bd.name+' already exists. OK = add brief to their notes. Cancel = create new contact.')){
      var updated=Object.assign({},existing); updated.notes=(existing.notes?existing.notes+'\n\n':'')+notesText;
      for(var k=0;k<contacts.length;k++){ if(contacts[k].id===existing.id){ contacts[k]=updated; break; } }
      saveContactSync(updated); toast('Brief added to '+bd.name+'\'s notes!'); return;
    }
  }
  editId=null; sMode='contact'; document.getElementById('sheet-title').textContent='Save to Contacts';
  buildCF({name:bd.name,role:'',phone:'',email:'',linkedin:'',website:'',photo:'',metAt:selectedMeetType,lastContact:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),notes:notesText,companies:bd.company?[{name:bd.company,type:'Other'}]:[],assistants:[]});
  openSheet(); toast('Review and tap Save contact to add to your CRM.');
}

async function processDebrief(){
  var transcript=(document.getElementById('db-transcript').value||'').trim();
  var topic=(document.getElementById('db-topic').value||'').trim();
  var attendees=(document.getElementById('db-attendees').value||'').trim();
  if(!transcript){ document.getElementById('db-transcript').focus(); return; }
  var btn=document.getElementById('db-btn');
  btn.disabled=true; btn.textContent='Processing...';
  document.getElementById('db-out').innerHTML='<div class="loading-dots" style="margin-top:12px"><div class="dot-r"></div><div class="dot-r"></div><div class="dot-r"></div><span>Reading transcript...</span></div>';
  var sys='You are an executive assistant AI for Kendra Burris, CEO of 7Crew Enterprises. Process meeting transcripts. Return ONLY valid JSON starting with { ending with }: {"action_items":[{"text":"string","owner":"string","priority":"high|medium|low"}],"decisions":["string"],"people_notes":[{"name":"string","initials":"string","note":"string"}],"email_subject":"string","email_body":"string","headline":"string"}. No markdown, no backticks.';
  var user='Meeting: '+(topic||'Untitled')+'\nAttendees: '+(attendees||'Not specified')+'\nTranscript:\n'+transcript;
  try{
    var raw=await callClaude(sys,user,false);
    var d=safeJSON(raw);
    var pColor=function(p){ return p==='high'?'p-high':p==='medium'?'p-med':'p-low'; };
    var pLabel=function(p){ return p==='high'?'Urgent':p==='medium'?'Soon':'When able'; };
    var html='<div style="margin-top:14px">';
    html+='<div style="font-size:12px;color:#6b7280;font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em">'+d.headline+'</div>';
    html+='<div class="ai-card"><div class="ai-card-head">Action Items<span class="badge-r">'+d.action_items.length+' total</span></div><div class="ai-card-body">';
    d.action_items.forEach(function(a,i){
      html+='<div class="action-item-row"><div class="priority-dot '+pColor(a.priority)+'" title="'+pLabel(a.priority)+'"></div><div class="action-chk" id="achk'+i+'" onclick="toggleChk('+i+')"></div><div style="flex:1"><div class="action-txt" id="atxt'+i+'">'+a.text+'</div><div class="action-own">→ '+(a.owner||'Unassigned')+' · '+pLabel(a.priority)+'</div></div></div>';
    });
    html+='</div></div>';
    html+='<div class="ai-card"><div class="ai-card-head">Key Decisions</div><div class="ai-card-body">';
    d.decisions.forEach(function(dec){ html+='<div class="decision-row">'+dec+'</div>'; });
    html+='</div></div>';
    if(d.people_notes&&d.people_notes.length){
      html+='<div class="ai-card"><div class="ai-card-head">People Notes</div><div class="ai-card-body">';
      d.people_notes.forEach(function(p){ html+='<div class="people-row-debrief"><div class="mini-av-r">'+p.initials+'</div><div><div style="font-size:13px;font-weight:700;color:var(--black)">'+p.name+'</div><div style="font-size:12px;color:#6b7280;line-height:1.4;margin-top:1px">'+p.note+'</div></div></div>'; });
      html+='</div></div>';
    }
    html+='<div class="ai-card"><div class="ai-card-head">Follow-up Email<button class="ai-btn-sec" style="width:auto;padding:5px 14px;margin:0" onclick="copyEmailDB()">Copy</button></div><div class="ai-card-body"><div class="email-subj">Subject: '+d.email_subject+'</div><div class="email-body-pre" id="email-db-body">'+d.email_body+'</div></div></div>';
    html+='</div>';
    var topicVal=(document.getElementById('db-topic').value||'').trim();
    var attendeesVal=(document.getElementById('db-attendees').value||'').trim();
    var outEl=document.getElementById('db-out');
    outEl.innerHTML=html;
    var saveWrap=document.createElement('div'); saveWrap.style.cssText='display:flex;gap:8px;margin-top:12px';
    var saveBtn=document.createElement('button'); saveBtn.className='btn-gen'; saveBtn.style.flex='1'; saveBtn.textContent='Save debrief';
    saveBtn.onclick=(function(t,a,h){ return function(){ saveDebrief(t,a,h); saveBtn.textContent='Saved ✓'; saveBtn.disabled=true; }; })(topicVal,attendeesVal,html);
    saveWrap.appendChild(saveBtn); outEl.appendChild(saveWrap);
  }catch(e){
    document.getElementById('db-out').innerHTML='<div style="padding:16px;background:#fff8f8;border-left:3px solid var(--red);border-radius:6px;font-size:13px;color:#6b7280"><strong style="color:var(--red);display:block;margin-bottom:6px">AI unavailable</strong>Deploy to Netlify to enable transcript processing.</div>';
  }
  btn.disabled=false; btn.textContent='Process transcript ↗';
}

function toggleChk(i){ var chk=document.getElementById('achk'+i); var txt=document.getElementById('atxt'+i); chk.classList.toggle('done'); txt.style.textDecoration=chk.classList.contains('done')?'line-through':'none'; txt.style.opacity=chk.classList.contains('done')?'0.4':'1'; }
function copyEmailDB(){ var subj=document.querySelector('.email-subj'); var body=document.getElementById('email-db-body'); if(!subj||!body) return; navigator.clipboard.writeText(subj.innerText+'\n\n'+body.innerText).then(function(){ toast('Copied!'); }); }
function toggleDebriefHistory(){ var p=document.getElementById('debrief-history-panel'); var t=document.getElementById('debrief-hist-toggle'); if(!p) return; if(p.style.display==='none'){ p.style.display='block'; if(t) t.innerHTML='⌃'; loadDebriefHistory(document.getElementById('debrief-history-list')); } else{ p.style.display='none'; if(t) t.innerHTML='⌄'; } }
function loadDebriefHistory(container){
  if(!container) return;
  container.innerHTML='<div class="loading-dots" style="padding:14px"><div class="dot-r"></div><div class="dot-r"></div><div class="dot-r"></div><span>Loading...</span></div>';
  supa('debriefs?select=id,created_at,topic,attendees&order=created_at.desc&limit=30').then(function(rows){
    if(!rows||!rows.length){ container.innerHTML='<div style="padding:20px 14px;text-align:center;font-size:12px;color:#6b7280;font-weight:600">No saved debriefs yet.</div>'; return; }
    var h=''; rows.forEach(function(r){ var dt=new Date(r.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); var tm=new Date(r.created_at).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); h+='<div style="padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer" onclick="loadSavedDebrief(\''+r.id+'\')"><div style="display:flex;justify-content:space-between"><div><div style="font-size:13px;font-weight:700">'+r.topic+'</div>'+(r.attendees?'<div style="font-size:11px;color:#6b7280">'+r.attendees+'</div>':'')+'</div><div style="text-align:right"><div style="font-size:11px;color:#6b7280">'+dt+'</div><div style="font-size:11px;color:var(--red);font-weight:700">'+tm+'</div></div></div></div>'; });
    container.innerHTML=h;
  }).catch(function(){ container.innerHTML='<div style="padding:12px 14px;font-size:12px;color:#6b7280">Sync unavailable — data stored locally.</div>'; });
}
function loadSavedDebrief(id){ supa('debriefs?id=eq.'+id+'&select=*').then(function(rows){ if(!rows||!rows.length){ toast('Debrief not found'); return; } var r=rows[0]; var out=document.getElementById('db-out'); if(out){ out.innerHTML='<div style="background:var(--black);color:#fff;border-radius:6px 6px 0 0;padding:10px 14px;margin-bottom:0"><div style="font-size:10px;color:#c0c2c4;font-weight:700;text-transform:uppercase">Saved Debrief — '+new Date(r.created_at).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})+'</div><div style="font-size:14px;font-weight:800;margin-top:2px">'+r.topic+'</div></div>'+r.html; out.scrollIntoView({behavior:'smooth',block:'start'}); } }).catch(function(){ toast('Could not load — sync unavailable'); }); }
function saveDebrief(topic,attendees,htmlContent){ supa('debriefs','POST',{topic:topic||'Untitled',attendees:attendees||'',html:htmlContent}).then(function(){ toast('Debrief saved!'); var p=document.getElementById('debrief-history-panel'); if(p&&p.style.display!=='none'){ loadDebriefHistory(document.getElementById('debrief-history-list')); } }).catch(function(){ toast('Saved locally only — sync unavailable'); }); }

async function processWBR(input){
  if(!input.files||!input.files[0]) return;
  var file=input.files[0];
  document.getElementById('wbr-filename').textContent=file.name;
  document.getElementById('wbr-content').innerHTML='<div class="loading-dots" style="padding:20px 0"><div class="dot-r"></div><div class="dot-r"></div><div class="dot-r"></div><span>Reading WBR — this takes about 20 seconds...</span></div>';
  try{
    var b64=await fileToBase64(file);
    var sys='You are parsing a 7Crew Enterprises Weekly Business Review PDF. Return ONLY raw HTML, no markdown, no backticks, no explanation. Structure: 1) One line of KPI spans. 2) A single HTML table with ALL stores. Use style attribute on each tr for row color: Elite(>2.3) #e8f5e8, HP(2.10-2.30) #e8f0fb, OT(1.90-2.10) #fdf3e3, NG(1.60-1.90) #fff3e0, AtRisk(<1.60) #fdecea, NewStore #fff. Columns: Rank, Store Name, W.E dates (4 cols), SSS%, L4A Total, ARR/T13. Font-size:11px on all td/th. Wrap in overflow-x:auto div. Include ALL stores.';
    var html=await callClaudeWithDoc(sys,'Parse this entire WBR PDF. Return the full HTML display with all stores.',b64);
    wbrData=html; wbrLoaded=true;
    document.getElementById('wbr-content').innerHTML=html;
    saveReportToSupa('wbr',html,file.name);
    extractMetricsFromWBR(b64);
    digestCache=null;
  }catch(e){
    document.getElementById('wbr-content').innerHTML='<div style="padding:16px;background:#fff8f8;border-left:3px solid var(--red);border-radius:6px;font-size:13px;color:#6b7280"><strong style="color:var(--red);display:block;margin-bottom:6px">Could not process PDF</strong>'+esc(e.message)+'<br><br>Ensure the Netlify function is deployed and the PDF is a valid WBR.</div>';
  }
}

async function extractMetricsFromWBR(b64){
  var sys='Extract key financial metrics from this 7Brew Coffee franchisee WBR. Return ONLY valid JSON: {"ytd_sales":"string","run_rate":"string","avg_weekly":"string","sss_overall":"string","avg_ticket":"string","employees":"string","wtx_weekly":"string","wtx_sss":"string","ok_weekly":"string","ok_sss":"string","swfl_weekly":"string","swfl_sss":"string","mature_weekly":"string","mature_sss":"string","week_ending":"string","raw_summary":"string"}. No markdown.';
  try{
    var body={model:'claude-haiku-4-5-20251001',max_tokens:1000,system:sys,messages:[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:'Extract the metrics. Return only JSON.'}]}]};
    var r=await fetch('/.netlify/functions/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok) return;
    var d=await r.json();
    if(!d.content) return;
    var raw=d.content.filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('');
    var metrics=safeJSON(raw); saveMetricsToSupa(metrics);
  }catch(e){ /* non-fatal */ }
}
