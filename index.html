<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="7Crew CRM">
<title>7Crew CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--red:#cb2026;--black:#0c0a0a;--gray:#c0c2c4;--light:#f2f2f2;--white:#fff;--muted:#6b7280;--border:#e2e2e2;--blue:#0056B4;--blue-mid:#81C1EA;--blue-light:#6FC3E8}
body{font-family:'Montserrat',sans-serif;background:var(--light);color:var(--black);overscroll-behavior:none}
a{color:inherit;text-decoration:none}
.topbar{background:var(--black);color:#fff;padding:10px 16px;min-height:80px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-circle{width:34px;height:34px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-7{font-size:18px;font-weight:800;color:var(--black);line-height:1}
.logo-text{display:flex;flex-direction:column;line-height:1}
.logo-crew{font-size:15px;font-weight:800;color:var(--red);letter-spacing:.02em}
.logo-ent{font-size:8px;font-weight:600;color:var(--gray);letter-spacing:.12em;text-transform:uppercase;margin-top:1px}
.btn-export{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:11px;padding:6px 12px;border-radius:4px;cursor:pointer;font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-family:inherit}
.tabs{display:flex;background:var(--white);border-bottom:2px solid var(--border)}
.tab{flex:1;padding:13px 8px;text-align:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;text-transform:uppercase;letter-spacing:.06em;margin-bottom:-2px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.search-wrap{padding:12px 16px;background:var(--white);border-bottom:1px solid var(--border);display:flex;gap:8px}
.search-wrap input{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;background:#f8f8f8;color:var(--black);outline:none;font-family:inherit;-webkit-appearance:none}
.search-wrap input:focus{border-color:var(--red)}
.btn-add{padding:10px 18px;background:var(--red);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:.04em}
.content{padding:12px 16px 40px}
.section{display:none}.section.active{display:block}
.contact-card{background:var(--white);border:1px solid var(--border);border-left:4px solid var(--blue);border-radius:8px;padding:14px;margin-bottom:10px;cursor:pointer}
.card-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;background:var(--black);color:#fff;overflow:hidden;border:2px solid var(--blue)}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.card-name{font-size:15px;font-weight:700;color:var(--black)}
.card-role{font-size:11px;color:var(--muted);margin-top:2px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.tag{font-size:11px;padding:3px 9px;border-radius:4px;border:1px solid var(--border);color:var(--muted);background:#f8f8f8;font-weight:500}
.tag.co{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600;cursor:pointer}
.tag.co.linked{border-bottom:2px solid var(--red)}
.card-meta{font-size:12px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}
.org-card{background:var(--white);border:1px solid var(--border);border-left:4px solid var(--blue-mid);border-radius:8px;margin-bottom:10px;overflow:hidden}
.org-card-body{padding:14px}
.org-name{font-size:15px;font-weight:700;color:var(--black)}
.org-sub{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.type-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:4px 10px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em}
.store-badge{background:var(--black);color:#fff;font-size:10px;font-weight:700;padding:4px 10px;border-radius:4px}
.map-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--black);font-weight:700;padding:6px 12px;border-radius:4px;background:var(--light);border:1px solid var(--border);cursor:pointer;margin-top:6px;margin-right:6px;text-transform:uppercase;letter-spacing:.04em;font-family:inherit}
.edit-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:700;padding:6px 12px;border-radius:4px;background:var(--light);border:1px solid var(--border);cursor:pointer;margin-top:6px;text-transform:uppercase;letter-spacing:.04em;font-family:inherit}
.territory-box{background:#f8f8f8;border-top:1px solid var(--border);padding:10px 14px;font-size:12px;color:var(--muted);line-height:1.6}
.territory-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--red);margin-bottom:4px}
.people-list{border-top:1px solid var(--border);padding:10px 14px}
.person-row{display:flex;align-items:center;gap:10px;padding:5px 0}
.mini-av{width:32px;height:32px;border-radius:50%;background:var(--black);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.person-name{font-size:13px;font-weight:600;color:var(--black)}
.person-role{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.view-btn{font-size:10px;color:var(--blue);font-weight:700;padding:4px 10px;border-radius:4px;background:#fff;border:1px solid var(--blue);cursor:pointer;margin-left:auto;flex-shrink:0;text-transform:uppercase;letter-spacing:.04em;font-family:inherit}
.overlay{position:fixed;inset:0;background:rgba(12,10,10,0.6);z-index:100;display:none}
.overlay.open{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;padding:16px 18px 40px;max-height:92vh;overflow-y:auto;z-index:101;transform:translateY(100%);transition:transform 0.3s ease}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--gray);border-radius:2px;margin:0 auto 16px}
.sheet-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;border-bottom:2px solid var(--blue);padding-bottom:12px}
.sheet-title{font-size:16px;font-weight:800;color:var(--black);text-transform:uppercase;letter-spacing:.04em}
.close-btn{width:30px;height:30px;border-radius:50%;background:var(--light);border:none;cursor:pointer;font-size:16px;color:var(--muted);font-family:inherit}
.form-row{margin-bottom:13px}
.form-row label{display:block;font-size:10px;color:var(--red);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;background:#fff;color:var(--black);outline:none;font-family:inherit;-webkit-appearance:none}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--red)}
.form-row textarea{resize:vertical;min-height:80px;line-height:1.5}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.divider{font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 10px;padding-top:14px;border-top:2px solid var(--red)}
.btn-save{width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px;font-family:inherit;text-transform:uppercase;letter-spacing:.06em}
.btn-sec{width:100%;padding:12px;background:var(--light);color:var(--black);border:1px solid var(--border);border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit;text-transform:uppercase;letter-spacing:.04em}
.btn-del{width:100%;padding:12px;background:#fff;color:var(--red);border:1px solid var(--red);border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;margin-top:6px;font-family:inherit;text-transform:uppercase;letter-spacing:.04em}
.add-more{width:100%;padding:10px;background:#fff;color:var(--black);border:1px dashed var(--gray);border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:10px;font-family:inherit;text-transform:uppercase;letter-spacing:.04em}
.sub-block{background:#f8f8f8;border-radius:6px;padding:12px;margin-bottom:8px;border:1px solid var(--border);border-left:3px solid var(--blue-mid);position:relative}
.sub-remove{position:absolute;top:8px;right:8px;background:var(--border);border:none;border-radius:50%;width:22px;height:22px;font-size:11px;cursor:pointer;color:var(--muted);font-family:inherit}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f1f1f1;font-size:14px}
.info-lbl{color:var(--muted);flex-shrink:0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.info-val{color:var(--black);font-weight:600;text-align:right;margin-left:12px}
.info-val a{color:var(--red)}
.notes-box{background:#f8f8f8;border-radius:6px;padding:12px;font-size:13px;color:var(--muted);line-height:1.6;border-left:3px solid var(--blue-light);margin-top:4px}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-size:11px;color:var(--blue);cursor:pointer;margin-bottom:16px;font-weight:700;padding:0;text-transform:uppercase;letter-spacing:.05em;font-family:inherit}
.detail-av{width:64px;height:64px;border-radius:50%;background:var(--black);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;flex-shrink:0;overflow:hidden;border:3px solid var(--blue)}
.detail-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.empty{text-align:center;padding:60px 20px}
.empty p{font-size:13px;color:var(--muted);font-weight:500}
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--black);color:#fff;padding:10px 22px;border-radius:4px;font-size:11px;font-weight:700;z-index:200;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;text-transform:uppercase;letter-spacing:.06em}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.nearby-banner{display:none;background:var(--red);color:#fff;padding:10px 16px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;width:100%;text-align:left}
.nearby-banner.show{display:block}
.nearby-banner-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;opacity:.85;margin-bottom:3px}
.nearby-banner-body{font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
</style>
</head>

function supa(path,method,body){
  var opts={method:method||'GET',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation'}};
  if(body)opts.body=JSON.stringify(body);
  return fetch(SUPA_URL+'/rest/v1/'+path,opts).then(function(r){return r.text().then(function(t){return t?JSON.parse(t):[];});});
}

function loadData(){
  try{var r=localStorage.getItem(SK);if(r){var d=JSON.parse(r);contacts=d.contacts||[];orgs=d.orgs||[];nid=d.nid||10;renderAll();}}catch(e){}
  fetchFromSupa();
}

function fetchFromSupa(){
  showSync('Loading...');
  supa('contacts?select=*&order=name')
  .then(function(rows){
    contacts=rows.map(function(r){
      return {id:r.id,name:r.name||'',role:r.role||'',phone:r.phone||'',email:r.email||'',linkedin:r.linkedin||'',website:r.website||'',photo:r.photo||'',metAt:r.met_at||'',lastContact:r.last_contact||'',notes:r.notes||'',companies:Array.isArray(r.companies)?r.companies:(typeof r.companies==='string'?JSON.parse(r.companies||'[]'):[]),assistants:Array.isArray(r.assistants)?r.assistants:(typeof r.assistants==='string'?JSON.parse(r.assistants||'[]'):[])};
    });
    return supa('orgs?select=*&order=name');
  })
  .then(function(rows){
    orgs=rows.map(function(r){
      return {id:r.id,name:r.name||'',type:r.type||'',territory:r.territory||'',stores:parseInt(r.stores)||0,territoryDesc:r.territory_desc||'',contacts:Array.isArray(r.contacts)?r.contacts:(typeof r.contacts==='string'?JSON.parse(r.contacts||'[]'):[])};
    });
    var maxId=10;
    contacts.forEach(function(c){if(parseInt(c.id)>=maxId)maxId=parseInt(c.id)+1;});
    orgs.forEach(function(o){if(parseInt(o.id)>=maxId)maxId=parseInt(o.id)+1;});
    nid=maxId;
    saveLocal();renderAll();hideSync();
  })
  .catch(function(e){console.error('Supa fetch:',e);hideSync();});
}

function saveLocal(){try{localStorage.setItem(SK,JSON.stringify({contacts:contacts,orgs:orgs,nid:nid}));}catch(e){}}

function upsertContact(c){
  var row={id:c.id,name:c.name,role:c.role,phone:c.phone,email:c.email,linkedin:c.linkedin,website:c.website,photo:c.photo,met_at:c.metAt,last_contact:c.lastContact,notes:c.notes,companies:c.companies,assistants:c.assistants};
  return supa('contacts?id=eq.'+c.id,'DELETE').catch(function(){}).then(function(){return supa('contacts','POST',row);});
}

function upsertOrg(o){
  var row={id:o.id,name:o.name,type:o.type,territory:o.territory,stores:o.stores,territory_desc:o.territoryDesc,contacts:o.contacts};
  return supa('orgs?id=eq.'+o.id,'DELETE').catch(function(){}).then(function(){return supa('orgs','POST',row);});
}

}

function syncAll(){
  showSync('Syncing...');
  var p=[];
  contacts.forEach(function(c){p.push(upsertContact(c));});
  orgs.forEach(function(o){p.push(upsertOrg(o));});
  Promise.all(p).then(function(){hideSync();toast('All synced!');}).catch(function(e){console.error(e);hideSync();toast('Sync error');});
}

function ini(n){return((n||'').split(' ').filter(function(w){return w.length>0;}).map(function(w){return w[0];}).join('').slice(0,2).toUpperCase());}
function gc(id){for(var i=0;i<contacts.length;i++){if(contacts[i].id===id||contacts[i].id===parseInt(id))return contacts[i];}return null;}
function go(id){for(var i=0;i<orgs.length;i++){if(orgs[i].id===id||orgs[i].id===parseInt(id))return orgs[i];}return null;}
function findOrg(name){for(var i=0;i<orgs.length;i++){if((orgs[i].name||'').toLowerCase()===(name||'').toLowerCase())return orgs[i].id;}return null;}

function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show';setTimeout(function(){t.className='toast';},2200);}

function renderAll(){
  renderContacts();renderOrgs();
  document.getElementById('contacts-count').textContent=contacts.length;
  document.getElementById('organizations-count').textContent=orgs.length;
}

function renderContacts(){
  var q=(document.getElementById('search-input').value||'').toLowerCase();
  var el=document.getElementById('contacts-list');
  var fl=contacts.filter(function(c){
    if(!q)return true;
    if((c.name||'').toLowerCase().indexOf(q)>=0)return true;
    if((c.role||'').toLowerCase().indexOf(q)>=0)return true;
    for(var i=0;i<(c.companies||[]).length;i++){if((c.companies[i].name||'').toLowerCase().indexOf(q)>=0)return true;}
    return false;
  });
  fl.sort(function(a,b){return(a.name||'').toLowerCase().localeCompare((b.name||'').toLowerCase());});
  if(!fl.length){el.innerHTML='<div class="empty"><p>'+(q?'No contacts match your search.':'No contacts yet. Tap + Add to get started.')+'</p></div>';return;}
  var h='';
  for(var i=0;i<fl.length;i++){
    var c=fl[i];
    var av=c.photo?'<img src="'+c.photo+'" alt="">':ini(c.name);
    var tg='';
    for(var j=0;j<(c.companies||[]).length;j++){var coName=c.companies[j].name;var oid=findOrg(coName);if(oid){tg+='<span class="tag co linked">'+coName+' &rsaquo;</span>';}else{tg+='<span class="tag co">'+coName+'</span>';}}
    if(c.metAt)tg+='<span class="tag">'+c.metAt+'</span>';
    var mt='';
    if(c.phone)mt+='<span>'+c.phone+'</span>';
    if(c.lastContact)mt+='<span>Last contact: '+c.lastContact+'</span>';
    if(c.assistants&&c.assistants.length)mt+='<span>+'+c.assistants.length+' asst.</span>';
    h+='<div class="contact-card" onclick="viewContact('+c.id+')"><div class="card-top"><div class="avatar">'+av+'</div><div style="flex:1;min-width:0"><div class="card-name">'+c.name+'</div><div class="card-role">'+c.role+'</div></div></div><div class="tags">'+tg+'</div><div class="card-meta">'+mt+'</div></div>';
  }
  el.innerHTML=h;
}

function renderOrgs(){
  var q=(document.getElementById('search-input').value||'').toLowerCase();
  var el=document.getElementById('organizations-list');
  var fl=orgs.filter(function(o){
    if(!q)return true;
    if((o.name||'').toLowerCase().indexOf(q)>=0)return true;
    if((o.territory||'').toLowerCase().indexOf(q)>=0)return true;
    if((o.type||'').toLowerCase().indexOf(q)>=0)return true;
    return false;
  });

  var h='';

    var o=fl[i];

    h+='<div class="org-card"><div class="org-card-body"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px"><div><div class="org-name">'+o.name+'</div>'+(o.territory?'<div class="org-sub">'+o.territory+'</div>':'')+'</div><div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end">'+(o.type?'<span class="type-badge">'+o.type+'</span>':'')+(o.stores?'<span class="store-badge">'+o.stores+' store'+(o.stores!==1?'s':'')+'</span>':'')+'</div></div><button class="map-btn" onclick="openMap(decodeURIComponent(this.dataset.q))" data-q="'+encodeURIComponent(o.territory||o.name)+'">&#x1F4CD; Map</button><button class="edit-btn" onclick="editOrg('+o.id+')">&#9998; Edit</button></div>'+(o.territoryDesc?'<div class="territory-box"><div class="territory-label">Territory / Notes</div>'+o.territoryDesc+'</div>':'')+(people?'<div class="people-list">'+people+'</div>':'')+'</div>';
  }
  el.innerHTML=h;

  document.getElementById('sheet-body').innerHTML='<button class="back-btn" onclick="closeSheet()">&#8592; Back</button><div style="display:flex;align-items:center;gap:14px;margin-bottom:18px"><div class="detail-av">'+av+'</div><div><div style="font-size:19px;font-weight:800">'+c.name+'</div><div style="font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.05em">'+c.role+'</div><div class="tags" style="margin-top:8px">'+tg+'</div></div></div>'+inf+nt+ah+'<button class="btn-sec" onclick="openEdit('+c.id+')">Edit contact</button><button class="btn-del" onclick="delContact('+c.id+')">Delete contact</button>';

function mAB(co,i){
  var typeOpts=['Franchisee','PE (Private Equity)','Equity Firm','Investor','Vendor','Supplier','Legal / Attorney','Accounting / CPA','Banking / Finance','Real Estate','Marketing / PR','Technology','Staffing / HR','Consultant','Corporate Partner','Community / Nonprofit','Media / Press','Other'];

  for(var x=0;x<orgs.length;x++){var selected=(co.name&&co.name===orgs[x].name)?' selected':'';orgOptions+='<option value="'+esc(orgs[x].name)+'"'+selected+'>'+esc(orgs[x].name)+'</option>';}
  orgOptions+='<option value="__new__"'+(co.name&&!orgs.find(function(o){return o.name===co.name;})?' selected':'')+'>+ Type new organization...</option>';

function saveC(){
  var name=(document.getElementById('fn').value||'').trim();
  if(!name){alert('Please enter a name.');return;}
  var cos=[];
  var ab=document.querySelectorAll('#assoc-list .sub-block');
  for(var i=0;i<ab.length;i++){
    var selEl=ab[i].querySelector('.co-select');

    var n='';
    if(selEl){if(selEl.value==='__new__'&&nameEl){n=nameEl.value.trim();}else if(selEl.value&&selEl.value!==''){n=selEl.value.trim();}else if(hiddenEl){n=hiddenEl.value.trim();}}
    else if(nameEl){n=nameEl.value.trim();}
    var t=ab[i].querySelector('.co-type').value;
    if(n)cos.push({name:n,type:t});
  }
  var assts=[];
  var bb=document.querySelectorAll('#asst-list .sub-block');
  for(var i=0;i<bb.length;i++){var an=(bb[i].querySelector('.asst-name')||{value:''}).value.trim();if(!an)continue;assts.push({name:an,role:(bb[i].querySelector('.asst-role')||{value:''}).value.trim(),phone:(bb[i].querySelector('.asst-phone')||{value:''}).value.trim(),email:(bb[i].querySelector('.asst-email')||{value:''}).value.trim()});}
  var data={name:name,role:(document.getElementById('fr').value||'').trim(),phone:(document.getElementById('fp').value||'').trim(),email:(document.getElementById('fe').value||'').trim(),linkedin:(document.getElementById('fli').value||'').trim(),website:(document.getElementById('fweb').value||'').trim(),photo:(document.getElementById('fph').value||'').trim(),metAt:(document.getElementById('fm').value||'').trim(),lastContact:(document.getElementById('flc').value||'').trim(),notes:(document.getElementById('fno').value||'').trim(),companies:cos,assistants:assts};
  var cid;
  if(editId){for(var k=0;k<contacts.length;k++){if(contacts[k].id===editId){contacts[k]=Object.assign({},contacts[k],data);break;}}cid=editId;}
  else{data.id=nid++;contacts.push(data);cid=data.id;}
  syncOrgs(cid,cos);
  var savedContact=null;for(var i=0;i<contacts.length;i++){if(contacts[i].id===cid){savedContact=contacts[i];break;}}
  saveContactSync(savedContact);
  closeSheet();renderAll();
  if(editId)toast('Contact updated');else toast('Contact added!');
}

function syncOrgs(cid,cos){
  for(var i=0;i<cos.length;i++){
    var nm=(cos[i].name||'').trim();if(!nm)continue;
    var found=false;
    for(var j=0;j<orgs.length;j++){if((orgs[j].name||'').toLowerCase()===nm.toLowerCase()){found=true;if(orgs[j].contacts.indexOf(cid)<0){orgs[j].contacts.push(cid);saveOrgSync(orgs[j]);}break;}}
    if(!found){var newOrg={id:nid++,name:nm,type:cos[i].type,territory:'',stores:0,territoryDesc:'',contacts:[cid]};orgs.push(newOrg);saveOrgSync(newOrg);}
  }
}

function buildOF(o){
  var opts=['Franchisee','PE (Private Equity)','Equity Firm','Investor','Vendor','Supplier','Legal / Attorney','Accounting / CPA','Banking / Finance','Real Estate','Marketing / PR','Technology','Staffing / HR','Consultant','Corporate Partner','Community / Nonprofit','Media / Press','Other'];
  var sel=opts.map(function(op){return'<option'+(o&&o.type===op?' selected':'')+'>'+op+'</option>';}).join('');
  document.getElementById('sheet-body').innerHTML=
    '<div class="form-row"><label>Organization name</label><input id="on" value="'+esc(o?o.name:'')+'" placeholder="e.g. Lone Star 7Brew"></div>'+
    '<div class="form-row"><label>Organization type</label><select id="ot">'+sel+'</select></div>'+
    '<div class="form-2col"><div class="form-row"><label>City / Territory</label><input id="ote" value="'+esc(o?o.territory||'':'')+'" placeholder="City, State"></div><div class="form-row"><label>Store count</label><input id="os" type="number" min="0" value="'+(o?o.stores:0)+'"></div></div>'+
    '<div class="form-row"><label>Territory / Notes</label><textarea id="otd" placeholder="Territory boundaries, counties covered, notes...">'+esc(o?o.territoryDesc||'':'')+'</textarea></div>'+

function saveO(){
  var name=(document.getElementById('on').value||'').trim();
  if(!name){alert('Please enter a name.');return;}
  var data={name:name,type:document.getElementById('ot').value,territory:(document.getElementById('ote').value||'').trim(),stores:parseInt(document.getElementById('os').value)||0,territoryDesc:(document.getElementById('otd').value||'').trim()};

  else{data.id=nid++;data.contacts=[];orgs.push(data);saveOrgSync(data);toast('Organization added!');}
  closeSheet();renderAll();
}

function delContact(id){
  if(!confirm('Delete this contact? This cannot be undone.'))return;
  contacts=contacts.filter(function(c){return c.id!==id;});
  for(var i=0;i<orgs.length;i++){orgs[i].contacts=(orgs[i].contacts||[]).filter(function(cid){return cid!==id;});}
  supa('contacts?id=eq.'+id,'DELETE').catch(function(e){console.error(e);});
  toast('Contact deleted');saveLocal();closeSheet();renderAll();
}

function delOrg(id){
  if(!confirm('Delete this organization? This cannot be undone.'))return;
  orgs=orgs.filter(function(o){return o.id!==id;});
  supa('orgs?id=eq.'+id,'DELETE').catch(function(e){console.error(e);});
  toast('Organization deleted');saveLocal();closeSheet();renderAll();
}

function exportBackup(){
  var data=JSON.stringify({contacts:contacts,orgs:orgs,nid:nid},null,2);
  var blob=new Blob([data],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='7crew-backup.json';a.click();
  URL.revokeObjectURL(url);toast('Backup exported!');
}

function importBackup(input){
  if(!input.files||!input.files[0])return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var d=JSON.parse(e.target.result);
      if(!d.contacts||!d.orgs){alert('Invalid backup file.');return;}
      if(!confirm('This will replace ALL current data with the backup. Continue?'))return;
      contacts=d.contacts||[];orgs=d.orgs||[];nid=d.nid||100;
      saveLocal();renderAll();
      toast('Imported! Syncing to cloud...');
      setTimeout(function(){syncAll();},500);
    }catch(err){alert('Could not read backup file.');}
  };
  reader.readAsText(input.files[0]);
  input.value='';
}

function handlePhoto(input){
  if(!input.files||!input.files[0])return;
  var file=input.files[0];
  if(file.size>2*1024*1024){alert('Photo must be under 2MB.');return;}
  var reader=new FileReader();
  reader.onload=function(e){document.getElementById('fph').value=e.target.result;document.getElementById('photo-preview').innerHTML='<img src="'+e.target.result+'" style="width:100%;height:100%;object-fit:cover">';};
  reader.readAsDataURL(file);
}

function esc(s){return(s||'').toString().replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

var CITY_COORDS={'lubbock':{lat:33.5779,lng:-101.8552},'midland':{lat:31.9973,lng:-102.0779},'odessa':{lat:31.8457,lng:-102.3676},'amarillo':{lat:35.2220,lng:-101.8313},'abilene':{lat:32.4487,lng:-99.7331},'austin':{lat:30.2672,lng:-97.7431},'dallas':{lat:32.7767,lng:-96.7970},'fort worth':{lat:32.7555,lng:-97.3308},'houston':{lat:29.7604,lng:-95.3698},'san antonio':{lat:29.4241,lng:-98.4936},'el paso':{lat:31.7619,lng:-106.4850},'wichita falls':{lat:33.9137,lng:-98.4934},'san angelo':{lat:31.4638,lng:-100.4370},'waco':{lat:31.5493,lng:-97.1467},'tyler':{lat:32.3513,lng:-95.3011}};
var nearbyOrgId=null;
function degToRad(d){return d*(Math.PI/180);}
function distanceMiles(lat1,lng1,lat2,lng2){var R=3958.8;var dLat=degToRad(lat2-lat1);var dLng=degToRad(lng2-lng1);var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(degToRad(lat1))*Math.cos(degToRad(lat2))*Math.sin(dLng/2)*Math.sin(dLng/2);return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function getCoordsForTerritory(territory){if(!territory)return null;var t=territory.toLowerCase();for(var city in CITY_COORDS){if(t.indexOf(city)>=0)return CITY_COORDS[city];}return null;}
function checkNearby(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(function(pos){
    var userLat=pos.coords.latitude,userLng=pos.coords.longitude,RADIUS=40,matches=[];
    for(var i=0;i<orgs.length;i++){var o=orgs[i];if(!o.territory)continue;var coords=getCoordsForTerritory(o.territory);if(!coords)continue;var dist=distanceMiles(userLat,userLng,coords.lat,coords.lng);if(dist<=RADIUS)matches.push({org:o,dist:Math.round(dist)});}
    if(matches.length>0){matches.sort(function(a,b){return a.dist-b.dist;});var closest=matches[0];nearbyOrgId=closest.org.id;var people=(closest.org.contacts||[]).map(function(cid){var c=gc(cid);return c?c.name:null;}).filter(Boolean);var peopleStr=people.length?people.slice(0,2).join(', ')+(people.length>2?' +more':''):'';var banner=document.getElementById('nearby-banner');var text=document.getElementById('nearby-text');text.textContent=closest.org.name+(peopleStr?' — '+peopleStr:'')+(closest.dist>0?' ('+closest.dist+' mi)':'');banner.className='nearby-banner show';}
  },function(){},{timeout:8000,maximumAge:300000});
}
function handleNearbyTap(){if(nearbyOrgId)viewOrg(nearbyOrgId);}

loadData();
renderAll();
checkNearby();
</script>

async function callClaude(system,user,useSearch){
  var body={model:'claude-haiku-4-5-20251001',max_tokens:2000,system:system,messages:[{role:'user',content:user}]};
  if(useSearch)body.tools=[{type:'web_search_20250305',name:'web_search'}];
  var r=await fetch('/.netlify/functions/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){throw new Error('HTTP '+r.status);}
  var d=await r.json();
  if(d.error){throw new Error(d.error.message);}
  if(!d.content||!Array.isArray(d.content)){throw new Error('Bad response: '+JSON.stringify(d).slice(0,100));}
  var txt=d.content.filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('');
  return txt.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
}

async function callClaudeLong(system,user,useSearch){
  var body={model:'claude-haiku-4-5-20251001',max_tokens:4000,system:system,messages:[{role:'user',content:user}]};
  if(useSearch)body.tools=[{type:'web_search_20250305',name:'web_search'}];

  if(d.error){throw new Error(d.error.message);}
  if(!d.content||!Array.isArray(d.content)){throw new Error('Bad response: '+JSON.stringify(d).slice(0,100));}
  var txt=d.content.filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('');
  return txt.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
}

function safeJSON(raw){
  if(!raw)throw new Error('Empty response from AI.');
  // Strip markdown fences
  var clean=raw.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
  // Extract first complete JSON object
  var start=clean.indexOf('{');
  var end=clean.lastIndexOf('}');
  if(start===-1||end===-1||end<=start){throw new Error('No JSON object found. Got: '+clean.slice(0,150));}
  try{
    return JSON.parse(clean.slice(start,end+1));
  }catch(e){
    throw new Error('JSON parse failed: '+e.message+'. Raw: '+clean.slice(0,150));
  }
}

function saveBriefToContact(){
  var bd=window._lastBriefData;
  if(!bd||!bd.name){toast('No brief to save yet.');return;}

  // Build notes from the brief content
  var notesText='[Meeting Prep — '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+']';
  if(bd.bio)notesText+='\n\n'+bd.bio;
  if(bd.talking_points)notesText+='\n\nTalking points:\n'+bd.talking_points;
  if(bd.things_to_watch)notesText+='\n\nWatch out for: '+bd.things_to_watch;

  // Check if contact already exists
  var existing=null;
  for(var i=0;i<contacts.length;i++){
    if((contacts[i].name||'').toLowerCase()===(bd.name||'').toLowerCase()){existing=contacts[i];break;}
  }

  if(existing){
    // Ask whether to update existing or create new
    if(confirm(bd.name+' already exists in your contacts.\n\nTap OK to add this brief to their notes.\nTap Cancel to create a new contact.')){
      // Append to existing notes
      var updated=Object.assign({},existing);
      updated.notes=(existing.notes?existing.notes+'\n\n':'')+notesText;
      for(var k=0;k<contacts.length;k++){if(contacts[k].id===existing.id){contacts[k]=updated;break;}}
      saveContactSync(updated);
      toast('Brief added to '+bd.name+'\'s notes!');
      return;
    }
  }

  // Open the add contact sheet pre-filled
  editId=null;
  sMode='contact';
  document.getElementById('sheet-title').textContent='Save to Contacts';

  // Build a prefilled contact object
  var prefill={
    name:bd.name,
    role:'',
    phone:'',
    email:'',
    linkedin:'',
    website:'',
    photo:'',
    metAt:selectedMeetType,
    lastContact:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
    notes:notesText,
    companies:bd.company?[{name:bd.company,type:'Other'}]:[],
    assistants:[]
  };

  buildCF(prefill);
  openSheet();

  // Override the save button to also close meeting prep state cleanly
  setTimeout(function(){
    var saveBtn=document.querySelector('#sheet-body .btn-save');
    if(saveBtn){
      saveBtn.textContent='Save contact';
    }
  },100);

  toast('Review and tap Save contact to add to your CRM.');
}

function fileToBase64(file){
  return new Promise(function(resolve,reject){
    var r=new FileReader();
    r.onload=function(e){resolve(e.target.result.split(',')[1]);};
    r.onerror=reject;
    r.readAsDataURL(file);
  });
}

async function callClaudeWithDoc(system,prompt,base64pdf){
  var body={model:'claude-haiku-4-5-20251001',max_tokens:4000,system:system,messages:[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:base64pdf}},{type:'text',text:prompt}]}]};
  var r=await fetch('/.netlify/functions/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){throw new Error('HTTP '+r.status);}
  var d=await r.json();
  if(d.error){throw new Error('API: '+d.error.message);}
  if(!d.content||!Array.isArray(d.content)){throw new Error('Bad response: '+JSON.stringify(d).slice(0,150));}
  return d.content.filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('').replace(/```html|```/g,'').trim();
}

    var sys='You are parsing a 7Crew Enterprises Weekly Development Review PDF. Return ONLY raw HTML, no markdown, no backticks, no explanation. IMPORTANT: Exclude any rows where the developer or contact company is "Red Sky" — they are only the lease broker and should not appear. Format rules: never truncate text, no overflow:hidden, all table cells wrap naturally, use full city names. Structure: 1) Stat boxes using <div class="dev-row"><div class="dev-box"><div class="dev-num">N</div><div class="dev-lbl">Label</div></div>...</div> for: Projects Out to Bid, Bid Accepted Not Under Construction, Projects Under Construction. 2) Bold section heading then table for "Building Drops — Next 4 Weeks" — columns: City, State, Drop Date. 3) Bold section heading then table for "Recent & Upcoming Openings" — columns: City, State, Open Date. 4) Bold section heading then table for "Full Construction Pipeline" — columns: City, State, Est. Open Date — color dates within 30 days style="color:#cb2026;font-weight:700", within 60 days style="color:#854F0B;font-weight:700". 5) Bold section heading then table for "Stand Count by Phase" — columns: Phase, Count. All section headings: <div style="font-size:10px;font-weight:800;color:#cb2026;text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px">Heading</div>. All tables: <table style="width:100%;border-collapse:collapse;margin-bottom:4px"> — th style="background:#0c0a0a;color:#fff;padding:8px 10px;font-size:11px;font-weight:700;text-align:left" — td style="padding:8px 10px;font-size:12px;border-bottom:1px solid #f1f1f1" — odd rows add background:#fafafa. Include every single location without exception.';
    var html=await callClaudeWithDoc(sys,'Parse this entire Development Review PDF. Return the full HTML display.',b64);
    devData=html;
    document.getElementById('dev-content').innerHTML=html;
    saveReportToSupa('dev', html, file.name);
  }catch(e){
    document.getElementById('dev-content').innerHTML='<div style="padding:12px;color:var(--red);font-size:13px;font-weight:600">Error: '+e.message+'</div>';

}


function copyEmailDB(){
  var subj=document.querySelector('.email-subj');
  var body=document.getElementById('email-db-body');
  if(!subj||!body)return;
  navigator.clipboard.writeText(subj.innerText+'\n\n'+body.innerText).then(function(){
    var b=document.querySelectorAll('.ai-card')[document.querySelectorAll('.ai-card').length-1].querySelector('button');
    b.textContent='Copied!';setTimeout(function(){b.textContent='Copy';},2000);
  });
}

function exportCSV(){
  var rows=[['Name','Role','Phone','Email','Company','Notes']];
  contacts.forEach(function(c){rows.push([c.name||'',c.role||'',c.phone||'',c.email||'',(c.companies||[]).map(function(x){return x.name;}).join('; '),c.notes||'']);});
  var csv=rows.map(function(r){return r.map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='7crew-contacts.csv';a.click();
  URL.revokeObjectURL(url);toast('CSV exported!');
}

var currentPrimary='contacts';

function switchPrimary(p){
  currentPrimary=p;
  document.querySelectorAll('.ptab').forEach(function(b){
    b.style.color=b.id==='ptab-'+p?'var(--red)':'var(--muted)';
    b.style.borderBottom=b.id==='ptab-'+p?'3px solid var(--red)':'3px solid transparent';
  });
  document.getElementById('sub-nav-digest').style.display='none';
  document.getElementById('sub-nav-contacts').style.display=p==='contacts'?'flex':'none';
  document.getElementById('sub-nav-meetings').style.display=p==='meetings'?'flex':'none';
  document.getElementById('sub-nav-financial').style.display=p==='financial'?'flex':'none';
  if(p==='digest')switchSub('digest');
  if(p==='contacts')switchSub('contacts');
  if(p==='meetings')switchSub('meetingprep');
  if(p==='financial')switchSub('dashboard');
}

function switchSub(t){
  var tab_=t;
  var allSections=['digest','contacts','organizations','dashboard','meetingprep','debrief','construction','wbr','development'];
  allSections.forEach(function(id){
    var sc=document.getElementById('sec-'+id);
    if(sc)sc.className='section'+(tab_===id?' active':'');
  });
  document.querySelectorAll('.stab').forEach(function(b){
    var match=b.id==='stab-'+tab_;
    b.style.color=match?'var(--red)':'var(--muted)';
    b.style.borderBottom=match?'2px solid var(--red)':'2px solid transparent';
  });
  var sb=document.getElementById('search-bar');
  if(sb)sb.style.display=(tab_==='contacts'||tab_==='organizations')?'flex':'none';
  if(tab_==='digest')renderDigest();
  if(tab_==='dashboard')renderDashboard();
  if(tab_==='meetingprep')renderMeetingPrep();
  if(tab_==='debrief')renderDebrief();
  if(tab_==='construction')renderConstruction();
  if(tab_==='wbr')renderWBR();
  if(tab_==='development')renderDevelopment();
  if(tab_==='contacts'||tab_==='organizations')renderAll();
}

switchPrimary('digest');
loadReportsFromSupa();
</script>
